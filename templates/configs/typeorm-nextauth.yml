harness:
  version: "1"
  stack:
    databases:
      - type: postgresql
        orm: typeorm
        migration_paths:
          - "src/migrations/**"
          - "src/entities/**"
          - "ormconfig*"
    auth:
      - provider: nextauth
        config_paths:
          - "src/auth/**"
          - "pages/api/auth/**"
          - "app/api/auth/**"
  risk_rules:
    high:
      file_patterns:
        - ".env*"
        - "**/secrets/**"
        - "**/*.pem"
        - "**/*.key"
        - "src/migrations/**"
        - "src/entities/**"
        - "ormconfig*"
        - "src/auth/**"
        - "pages/api/auth/**"
        - "app/api/auth/**"
      ast_rules:
        - id: raw_sql_ddl
          description: "Raw SQL DDL statements in template literals"
          query: |
            (call_expression
              function: (identifier) @tag
              (#match? @tag "^(sql|db|query|execute)$")
              arguments: (template_string) @content
              (#match? @content "(DROP|ALTER|CREATE|TRUNCATE)\\s+TABLE"))
      dependency_rules:
        added_packages:
          - "typeorm"
          - "next-auth"
          - "@next-auth/*"
          - "@auth/*"
          - "jsonwebtoken"
      diff_size:
        max_files: 20
        max_lines: 500
    low:
      file_patterns:
        - "**/*.test.ts"
        - "**/*.spec.ts"
        - "**/*.test.js"
        - "**/*.spec.js"
        - "**/*.md"
        - "**/*.mdx"
  auto_merge:
    enabled: false
    require_ci_pass: true
    ai_score_threshold: 75
    strategy: squash
  ai_review:
    focus_areas:
      - "security vulnerabilities"
      - "logic errors"
      - "performance regressions"
      - "breaking API changes"
    max_diff_tokens: 8000
